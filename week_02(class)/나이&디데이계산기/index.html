<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>만 나이 & D-day 계산기</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script>
tailwind.config = {
  darkMode: 'class',
}
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Noto Sans KR', sans-serif; }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-in-up { animation: fadeInUp 0.35s ease-out forwards; }
  @keyframes scaleIn {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
  }
  .scale-in { animation: scaleIn 0.3s ease-out forwards; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useEffect, createContext, useContext } = React;

// ========================================
// 🌙 Theme Context
// ========================================

const ThemeContext = createContext();

function ThemeProvider({ children }) {
  const [dark, setDark] = useState(() => {
    try {
      const saved = localStorage.getItem('theme');
      if (saved) return saved === 'dark';
      return window.matchMedia('(prefers-color-scheme: dark)').matches;
    } catch { return false; }
  });

  useEffect(() => {
    document.documentElement.classList.toggle('dark', dark);
    localStorage.setItem('theme', dark ? 'dark' : 'light');
  }, [dark]);

  return (
    <ThemeContext.Provider value={{ dark, toggle: () => setDark(d => !d) }}>
      {children}
    </ThemeContext.Provider>
  );
}

function useTheme() { return useContext(ThemeContext); }

// ========================================
// 🎨 Design System Components
// ========================================

function Input({ label, value, onChange, placeholder, min, max, className = '' }) {
  return (
    <div className={`flex flex-col gap-1.5 ${className}`}>
      <label className="text-xs font-medium text-gray-500 dark:text-gray-400">{label}</label>
      <input
        type="number"
        value={value}
        onChange={(e) => onChange(e.target.value)}
        placeholder={placeholder}
        min={min}
        max={max}
        className="w-full px-3 py-2.5 text-center text-lg font-semibold
                   text-gray-800 dark:text-gray-100
                   bg-gray-100 dark:bg-gray-700
                   border border-gray-200 dark:border-gray-600 rounded-lg
                   focus:border-indigo-500 dark:focus:border-indigo-400 focus:ring-0
                   outline-none transition-colors
                   placeholder:text-gray-300 dark:placeholder:text-gray-500 placeholder:font-normal"
      />
    </div>
  );
}

function TextInput({ label, value, onChange, placeholder, className = '' }) {
  return (
    <div className={`flex flex-col gap-1.5 ${className}`}>
      <label className="text-xs font-medium text-gray-500 dark:text-gray-400">{label}</label>
      <input
        type="text"
        value={value}
        onChange={(e) => onChange(e.target.value)}
        placeholder={placeholder}
        className="w-full px-3 py-2.5 text-lg font-semibold
                   text-gray-800 dark:text-gray-100
                   bg-gray-100 dark:bg-gray-700
                   border border-gray-200 dark:border-gray-600 rounded-lg
                   focus:border-indigo-500 dark:focus:border-indigo-400 focus:ring-0
                   outline-none transition-colors
                   placeholder:text-gray-300 dark:placeholder:text-gray-500 placeholder:font-normal placeholder:text-base"
      />
    </div>
  );
}

function Button({ children, onClick, disabled, variant = 'primary', className = '' }) {
  const variants = {
    primary: `bg-indigo-500 dark:bg-indigo-600 text-white
              hover:bg-indigo-600 dark:hover:bg-indigo-500
              disabled:bg-gray-300 dark:disabled:bg-gray-600 disabled:text-gray-400`,
    secondary: `bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300
                border border-gray-200 dark:border-gray-600
                hover:bg-gray-200 dark:hover:bg-gray-600`,
  };
  return (
    <button
      onClick={onClick}
      disabled={disabled}
      className={`px-5 py-3 rounded-lg font-semibold text-base
                  transition-colors active:scale-[0.98]
                  disabled:cursor-not-allowed disabled:active:scale-100
                  ${variants[variant]} ${className}`}
    >
      {children}
    </button>
  );
}

function Card({ children, className = '' }) {
  return (
    <div className={`bg-white dark:bg-gray-800
                     border border-gray-200 dark:border-gray-700
                     rounded-xl ${className}`}>
      {children}
    </div>
  );
}

function ThemeToggle() {
  const { dark, toggle } = useTheme();
  return (
    <button
      onClick={toggle}
      className="p-2 rounded-lg bg-gray-100 dark:bg-gray-700
                 border border-gray-200 dark:border-gray-600
                 text-gray-600 dark:text-gray-300
                 hover:bg-gray-200 dark:hover:bg-gray-600
                 transition-colors text-lg"
      title={dark ? '라이트 모드' : '다크 모드'}
    >
      {dark ? '☀️' : '🌙'}
    </button>
  );
}

// ========================================
// 📄 만 나이 계산기
// ========================================

function AgeCalculator() {
  const today = new Date();
  const [year, setYear] = useState('');
  const [month, setMonth] = useState('');
  const [day, setDay] = useState('');
  const [result, setResult] = useState(null);

  const isValidDate = useMemo(() => {
    const y = parseInt(year);
    const m = parseInt(month);
    const d = parseInt(day);
    if (!y || !m || !d) return false;
    if (y < 1900 || y > today.getFullYear()) return false;
    if (m < 1 || m > 12) return false;
    if (d < 1 || d > 31) return false;
    const dateObj = new Date(y, m - 1, d);
    if (dateObj.getFullYear() !== y || dateObj.getMonth() !== m - 1 || dateObj.getDate() !== d) return false;
    if (dateObj > today) return false;
    return true;
  }, [year, month, day]);

  function calculateAge() {
    const birthYear = parseInt(year);
    const birthMonth = parseInt(month);
    const birthDay = parseInt(day);

    let ageYears = today.getFullYear() - birthYear;
    let ageMonths = today.getMonth() + 1 - birthMonth;
    let ageDays = today.getDate() - birthDay;

    if (ageDays < 0) {
      ageMonths--;
      const prevMonth = new Date(today.getFullYear(), today.getMonth(), 0);
      ageDays += prevMonth.getDate();
    }
    if (ageMonths < 0) {
      ageYears--;
      ageMonths += 12;
    }

    const birthDate = new Date(birthYear, birthMonth - 1, birthDay);
    const totalDays = Math.floor((today - birthDate) / (1000 * 60 * 60 * 24));

    const nextBirthday = new Date(today.getFullYear(), birthMonth - 1, birthDay);
    if (nextBirthday <= today) {
      nextBirthday.setFullYear(today.getFullYear() + 1);
    }
    const daysUntilBirthday = Math.ceil((nextBirthday - today) / (1000 * 60 * 60 * 24));

    const yearAge = today.getFullYear() - birthYear;
    const koreanAge = yearAge + 1;

    setResult({ ageYears, ageMonths, ageDays, totalDays, daysUntilBirthday, yearAge, koreanAge });
  }

  function handleReset() {
    setYear('');
    setMonth('');
    setDay('');
    setResult(null);
  }

  return (
    <div>
      <Card className="p-5 mb-4 fade-in-up">
        <h2 className="text-xs font-semibold text-gray-400 dark:text-gray-500 uppercase tracking-wider mb-4">
          생년월일 입력
        </h2>
        <div className="grid grid-cols-3 gap-3 mb-5">
          <Input label="년" value={year} onChange={setYear} placeholder="2000" min="1900" max={today.getFullYear()} />
          <Input label="월" value={month} onChange={setMonth} placeholder="1" min="1" max="12" />
          <Input label="일" value={day} onChange={setDay} placeholder="1" min="1" max="31" />
        </div>
        <div className="flex gap-3">
          <Button onClick={calculateAge} disabled={!isValidDate} className="flex-1">
            계산하기
          </Button>
          {(year || month || day) && (
            <Button onClick={handleReset} variant="secondary">초기화</Button>
          )}
        </div>
        {year && month && day && !isValidDate && (
          <p className="text-red-500 text-sm text-center mt-3">올바른 생년월일을 입력해 주세요.</p>
        )}
      </Card>

      {result && (
        <Card className="p-5 scale-in">
          <h2 className="text-xs font-semibold text-gray-400 dark:text-gray-500 uppercase tracking-wider mb-4">
            나이 계산 결과
          </h2>

          {/* 3가지 나이 비교 */}
          <div className="grid grid-cols-3 gap-3 mb-4">
            <div className="text-center py-4 bg-indigo-50 dark:bg-indigo-900/30 border border-indigo-200 dark:border-indigo-800 rounded-lg">
              <p className="text-[10px] font-semibold text-indigo-400 dark:text-indigo-300 mb-1 uppercase">만 나이</p>
              <span className="text-3xl font-bold text-indigo-600 dark:text-indigo-400">{result.ageYears}</span>
              <span className="text-xs font-semibold text-indigo-400 dark:text-indigo-300 ml-0.5">세</span>
              <p className="text-[9px] text-indigo-300 dark:text-indigo-500 mt-1">법적 기준</p>
            </div>
            <div className="text-center py-4 bg-emerald-50 dark:bg-emerald-900/30 border border-emerald-200 dark:border-emerald-800 rounded-lg">
              <p className="text-[10px] font-semibold text-emerald-400 dark:text-emerald-300 mb-1 uppercase">연 나이</p>
              <span className="text-3xl font-bold text-emerald-600 dark:text-emerald-400">{result.yearAge}</span>
              <span className="text-xs font-semibold text-emerald-400 dark:text-emerald-300 ml-0.5">세</span>
              <p className="text-[9px] text-emerald-300 dark:text-emerald-500 mt-1">년도 차이</p>
            </div>
            <div className="text-center py-4 bg-amber-50 dark:bg-amber-900/30 border border-amber-200 dark:border-amber-800 rounded-lg">
              <p className="text-[10px] font-semibold text-amber-400 dark:text-amber-300 mb-1 uppercase">세는 나이</p>
              <span className="text-3xl font-bold text-amber-600 dark:text-amber-400">{result.koreanAge}</span>
              <span className="text-xs font-semibold text-amber-400 dark:text-amber-300 ml-0.5">세</span>
              <p className="text-[9px] text-amber-300 dark:text-amber-500 mt-1">전통 방식</p>
            </div>
          </div>

          {/* 상세 정보 */}
          <div className="space-y-2">
            <div className="flex items-center justify-between py-2.5 px-3 bg-gray-50 dark:bg-gray-700/50 rounded-lg">
              <span className="text-gray-500 dark:text-gray-400 text-sm">상세 만 나이</span>
              <span className="font-semibold text-gray-800 dark:text-gray-200 text-sm">
                {result.ageYears}년 {result.ageMonths}개월 {result.ageDays}일
              </span>
            </div>
            <div className="flex items-center justify-between py-2.5 px-3 bg-gray-50 dark:bg-gray-700/50 rounded-lg">
              <span className="text-gray-500 dark:text-gray-400 text-sm">태어난 지</span>
              <span className="font-semibold text-gray-800 dark:text-gray-200 text-sm">
                {result.totalDays.toLocaleString()}일
              </span>
            </div>
            <div className="flex items-center justify-between py-2.5 px-3 bg-pink-50 dark:bg-pink-900/20 border border-pink-100 dark:border-pink-800/50 rounded-lg">
              <span className="text-gray-500 dark:text-gray-400 text-sm">다음 생일까지</span>
              <span className="font-semibold text-pink-600 dark:text-pink-400 text-sm">
                {result.daysUntilBirthday === 365 || result.daysUntilBirthday === 366
                  ? '🎉 오늘이 생일입니다!'
                  : `${result.daysUntilBirthday}일 남음`}
              </span>
            </div>
          </div>

          {/* 나이 설명 */}
          <div className="mt-4 p-3 bg-gray-50 dark:bg-gray-700/50 rounded-lg text-xs text-gray-400 dark:text-gray-500 space-y-1">
            <p><span className="font-semibold text-indigo-500 dark:text-indigo-400">만 나이</span> — 생일이 지나야 +1세 (2023년부터 법적 기준)</p>
            <p><span className="font-semibold text-emerald-500 dark:text-emerald-400">연 나이</span> — 현재년도 - 출생년도 (병역법 등 일부 법령)</p>
            <p><span className="font-semibold text-amber-500 dark:text-amber-400">세는 나이</span> — 태어나면 1살, 매년 1월 1일 +1세 (전통 방식)</p>
          </div>
        </Card>
      )}
    </div>
  );
}

// ========================================
// 📄 D-day 계산기
// ========================================

function DdayCalculator() {
  const today = new Date();
  today.setHours(0, 0, 0, 0);

  const [title, setTitle] = useState('');
  const [year, setYear] = useState('');
  const [month, setMonth] = useState('');
  const [day, setDay] = useState('');
  const [ddayList, setDdayList] = useState(() => {
    try {
      const saved = localStorage.getItem('ddayList');
      return saved ? JSON.parse(saved) : [];
    } catch { return []; }
  });

  useEffect(() => {
    localStorage.setItem('ddayList', JSON.stringify(ddayList));
  }, [ddayList]);

  const isValidDate = useMemo(() => {
    const y = parseInt(year);
    const m = parseInt(month);
    const d = parseInt(day);
    if (!y || !m || !d) return false;
    if (y < 1900 || y > 2100) return false;
    if (m < 1 || m > 12) return false;
    if (d < 1 || d > 31) return false;
    const dateObj = new Date(y, m - 1, d);
    return dateObj.getFullYear() === y && dateObj.getMonth() === m - 1 && dateObj.getDate() === d;
  }, [year, month, day]);

  function getDday(targetDateStr) {
    const target = new Date(targetDateStr);
    target.setHours(0, 0, 0, 0);
    return Math.ceil((target - today) / (1000 * 60 * 60 * 24));
  }

  function addDday() {
    if (!isValidDate || !title.trim()) return;
    const dateStr = `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
    setDdayList(prev => [{ id: Date.now(), title: title.trim(), date: dateStr }, ...prev]);
    setTitle('');
    setYear('');
    setMonth('');
    setDay('');
  }

  function removeDday(id) {
    setDdayList(prev => prev.filter(item => item.id !== id));
  }

  function formatDday(diff) {
    if (diff === 0) return 'D-Day';
    if (diff > 0) return `D-${diff}`;
    return `D+${Math.abs(diff)}`;
  }

  function getDdayColor(diff) {
    if (diff === 0) return 'text-yellow-600 dark:text-yellow-400';
    if (diff > 0 && diff <= 7) return 'text-red-500 dark:text-red-400';
    if (diff > 0 && diff <= 30) return 'text-orange-500 dark:text-orange-400';
    if (diff > 0) return 'text-indigo-500 dark:text-indigo-400';
    return 'text-gray-400 dark:text-gray-500';
  }

  function getDdayBorder(diff) {
    if (diff === 0) return 'border-yellow-300 dark:border-yellow-700 bg-yellow-50 dark:bg-yellow-900/20';
    if (diff > 0 && diff <= 7) return 'border-red-200 dark:border-red-800 bg-red-50 dark:bg-red-900/20';
    if (diff > 0 && diff <= 30) return 'border-orange-200 dark:border-orange-800 bg-orange-50 dark:bg-orange-900/20';
    if (diff > 0) return 'border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800';
    return 'border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800/50';
  }

  return (
    <div>
      <Card className="p-5 mb-4 fade-in-up">
        <h2 className="text-xs font-semibold text-gray-400 dark:text-gray-500 uppercase tracking-wider mb-4">
          D-day 추가
        </h2>
        <TextInput
          label="목표 / 항목"
          value={title}
          onChange={setTitle}
          placeholder="예: 시험일, 여행 출발, 프로젝트 마감"
          className="mb-4"
        />
        <div className="grid grid-cols-3 gap-3 mb-5">
          <Input label="년" value={year} onChange={setYear} placeholder="2026" min="1900" max="2100" />
          <Input label="월" value={month} onChange={setMonth} placeholder="12" min="1" max="12" />
          <Input label="일" value={day} onChange={setDay} placeholder="25" min="1" max="31" />
        </div>
        <Button onClick={addDday} disabled={!isValidDate || !title.trim()} className="w-full">
          추가하기
        </Button>
        {year && month && day && !isValidDate && (
          <p className="text-red-500 text-sm text-center mt-3">올바른 날짜를 입력해 주세요.</p>
        )}
      </Card>

      {ddayList.length > 0 ? (
        <div className="space-y-2 fade-in-up">
          {ddayList.map((item) => {
            const diff = getDday(item.date);
            return (
              <div key={item.id} className={`p-4 border rounded-xl scale-in ${getDdayBorder(diff)}`}>
                <div className="flex items-center justify-between">
                  <div className="flex-1 min-w-0 mr-3">
                    <h3 className="font-semibold text-gray-800 dark:text-gray-200 truncate">{item.title}</h3>
                    <p className="text-xs text-gray-400 dark:text-gray-500 mt-0.5">
                      {item.date.replace(/-/g, '.')}
                    </p>
                  </div>
                  <div className="flex items-center gap-3">
                    <span className={`text-xl font-bold ${getDdayColor(diff)}`}>
                      {formatDday(diff)}
                    </span>
                    <button
                      onClick={() => removeDday(item.id)}
                      className="text-gray-300 dark:text-gray-600 hover:text-red-400 dark:hover:text-red-400 transition-colors p-1"
                      title="삭제"
                    >
                      <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                        <path fillRule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clipRule="evenodd" />
                      </svg>
                    </button>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      ) : (
        <Card className="p-8 text-center fade-in-up">
          <p className="text-3xl mb-2">📅</p>
          <p className="text-gray-400 dark:text-gray-500 text-sm">아직 등록된 D-day가 없어요</p>
          <p className="text-gray-300 dark:text-gray-600 text-xs mt-1">위에서 목표와 날짜를 입력해 추가해 보세요!</p>
        </Card>
      )}
    </div>
  );
}

// ========================================
// 🚀 App Component
// ========================================

function App() {
  const [tab, setTab] = useState('age');
  const today = new Date();

  return (
    <div className="min-h-screen bg-gray-50 dark:bg-gray-900 transition-colors flex items-center justify-center p-4">
      <div className="w-full max-w-md">
        {/* Header */}
        <div className="flex items-center justify-between mb-6 fade-in-up">
          <div>
            <h1 className="text-2xl font-bold text-gray-800 dark:text-gray-100">
              {tab === 'age' ? '🎂 만 나이 계산기' : '📅 D-day 계산기'}
            </h1>
            <p className="text-gray-400 dark:text-gray-500 text-sm mt-1">
              {tab === 'age' ? '생년월일을 입력하면 만 나이를 알려드려요' : '목표 날짜까지 남은 일수를 확인하세요'}
            </p>
          </div>
          <ThemeToggle />
        </div>

        {/* Tab Buttons */}
        <div className="flex gap-1 mb-5 bg-gray-200 dark:bg-gray-800 p-1 rounded-lg">
          <button
            onClick={() => setTab('age')}
            className={`flex-1 py-2.5 rounded-md font-semibold text-sm transition-colors
              ${tab === 'age'
                ? 'bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-100'
                : 'text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-300'}`}
          >
            만 나이
          </button>
          <button
            onClick={() => setTab('dday')}
            className={`flex-1 py-2.5 rounded-md font-semibold text-sm transition-colors
              ${tab === 'dday'
                ? 'bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-100'
                : 'text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-300'}`}
          >
            D-day
          </button>
        </div>

        {/* Content */}
        {tab === 'age' ? <AgeCalculator /> : <DdayCalculator />}

        {/* Footer */}
        <p className="text-center text-gray-400 dark:text-gray-600 text-xs mt-6">
          오늘 날짜: {today.getFullYear()}년 {today.getMonth() + 1}월 {today.getDate()}일 기준
        </p>
      </div>
    </div>
  );
}

// ========================================
// Rendering
// ========================================

ReactDOM.createRoot(document.getElementById('root')).render(
  <ThemeProvider><App /></ThemeProvider>
);
</script>
</body>
</html>
