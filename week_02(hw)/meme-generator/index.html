<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>짤 생성기 - Meme Generator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', -apple-system, sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    min-height: 100vh;
  }

  header {
    text-align: center;
    padding: 24px 16px 12px;
    background: linear-gradient(135deg, #16213e, #0f3460);
    border-bottom: 2px solid #e94560;
  }
  header h1 { font-size: 1.8rem; letter-spacing: 2px; }
  header h1 span { color: #e94560; }
  header p { font-size: 0.85rem; color: #999; margin-top: 4px; }

  .app {
    display: flex;
    gap: 24px;
    max-width: 1200px;
    margin: 24px auto;
    padding: 0 16px;
  }

  /* ---- Controls Panel ---- */
  .controls {
    flex: 0 0 320px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .card {
    background: #16213e;
    border-radius: 12px;
    padding: 16px;
    border: 1px solid #0f3460;
  }
  .card h3 {
    font-size: 0.9rem;
    color: #e94560;
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* Upload zone */
  .upload-zone {
    border: 2px dashed #0f3460;
    border-radius: 8px;
    padding: 32px 16px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .upload-zone:hover, .upload-zone.dragover {
    border-color: #e94560;
    background: rgba(233, 69, 96, 0.05);
  }
  .upload-zone .icon { font-size: 2.5rem; margin-bottom: 8px; }
  .upload-zone p { font-size: 0.85rem; color: #888; }
  .upload-zone input { display: none; }

  /* Text inputs */
  label { display: block; font-size: 0.8rem; color: #aaa; margin-bottom: 4px; }
  input[type="password"], input[type="text"] {
    width: 100%;
    background: #1a1a2e;
    border: 1px solid #0f3460;
    border-radius: 6px;
    color: #fff;
    padding: 8px 10px;
    font-size: 0.85rem;
    font-family: inherit;
  }
  input[type="password"]:focus, input[type="text"]:focus { outline: none; border-color: #e94560; }
  textarea {
    width: 100%;
    background: #1a1a2e;
    border: 1px solid #0f3460;
    border-radius: 6px;
    color: #fff;
    padding: 8px 10px;
    font-size: 0.9rem;
    resize: vertical;
    min-height: 48px;
    font-family: inherit;
  }
  textarea:focus { outline: none; border-color: #e94560; }

  .field + .field { margin-top: 12px; }

  /* Range & color */
  .row { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
  .row label { margin: 0; white-space: nowrap; flex-shrink: 0; }
  input[type="range"] {
    flex: 1;
    accent-color: #e94560;
  }
  .range-val {
    font-size: 0.8rem;
    color: #e94560;
    min-width: 32px;
    text-align: right;
  }
  input[type="color"] {
    width: 32px; height: 32px;
    border: none; background: none;
    cursor: pointer;
  }
  select {
    background: #1a1a2e;
    color: #fff;
    border: 1px solid #0f3460;
    border-radius: 6px;
    padding: 6px 8px;
    font-size: 0.85rem;
  }

  /* Buttons */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    width: 100%;
  }
  .btn-primary {
    background: linear-gradient(135deg, #e94560, #c23152);
    color: #fff;
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(233,69,96,0.4); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

  .btn-secondary {
    background: linear-gradient(135deg, #0f3460, #16213e);
    color: #e94560;
    border: 1px solid #e94560;
  }
  .btn-secondary:hover { background: rgba(233, 69, 96, 0.1); }
  .btn-secondary:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ---- Preview Area ---- */
  .preview {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .canvas-wrap {
    background: #16213e;
    border-radius: 12px;
    padding: 16px;
    border: 1px solid #0f3460;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 400px;
    width: 100%;
    position: relative;
  }
  .canvas-wrap canvas {
    max-width: 100%;
    max-height: 70vh;
    border-radius: 4px;
  }
  .canvas-placeholder {
    text-align: center;
    color: #555;
  }
  .canvas-placeholder .icon { font-size: 3rem; }
  .canvas-placeholder p { margin-top: 8px; }

  /* Position controls */
  .position-section { display: flex; gap: 8px; flex-wrap: wrap; }
  .pos-btn {
    padding: 6px 12px;
    border-radius: 6px;
    border: 1px solid #0f3460;
    background: #1a1a2e;
    color: #ccc;
    cursor: pointer;
    font-size: 0.8rem;
    transition: all 0.15s;
  }
  .pos-btn:hover { border-color: #e94560; color: #e94560; }
  .pos-btn.active { background: #e94560; color: #fff; border-color: #e94560; }

  /* AI status */
  .ai-status {
    font-size: 0.8rem;
    padding: 8px 10px;
    border-radius: 6px;
    margin-top: 8px;
    display: none;
  }
  .ai-status.loading {
    display: block;
    background: rgba(233, 69, 96, 0.1);
    color: #e94560;
    border: 1px solid rgba(233, 69, 96, 0.3);
  }
  .ai-status.success {
    display: block;
    background: rgba(76, 175, 80, 0.1);
    color: #4caf50;
    border: 1px solid rgba(76, 175, 80, 0.3);
  }
  .ai-status.error {
    display: block;
    background: rgba(244, 67, 54, 0.1);
    color: #f44336;
    border: 1px solid rgba(244, 67, 54, 0.3);
  }

  /* Spinner */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid rgba(233,69,96,0.3);
    border-top-color: #e94560;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }

  /* Responsive */
  @media (max-width: 768px) {
    .app { flex-direction: column; }
    .controls { flex: none; }
  }
</style>
</head>
<body>

<header>
  <h1><span>짤</span> 생성기</h1>
  <p>이미지를 업로드하면 AI가 자동으로 재미있는 대사를 만들어줍니다</p>
</header>

<div class="app">
  <!-- Controls -->
  <div class="controls">
    <!-- API Key -->
    <div class="card">
      <h3>0. API 설정</h3>
      <div class="field">
        <label>Claude API Key</label>
        <input type="password" id="apiKey" placeholder="sk-ant-...">
      </div>
    </div>

    <!-- Upload -->
    <div class="card">
      <h3>1. 이미지 업로드</h3>
      <div class="upload-zone" id="uploadZone">
        <div class="icon">🖼️</div>
        <p>클릭하거나 이미지를 드래그하세요</p>
        <input type="file" id="fileInput" accept="image/*">
      </div>
      <div class="ai-status" id="aiStatus"></div>
    </div>

    <!-- Text -->
    <div class="card">
      <h3>2. 대사 (AI 자동생성 / 직접 수정)</h3>
      <div class="field">
        <label>상단 텍스트</label>
        <textarea id="topText" placeholder="이미지 업로드 시 AI가 자동 생성합니다..." rows="2"></textarea>
      </div>
      <div class="field">
        <label>하단 텍스트</label>
        <textarea id="bottomText" placeholder="직접 수정도 가능합니다..." rows="2"></textarea>
      </div>
      <button class="btn btn-secondary" id="regenerateBtn" disabled style="margin-top:10px;">
        🔄 AI 대사 다시 생성
      </button>
    </div>

    <!-- Settings -->
    <div class="card">
      <h3>3. 스타일 설정</h3>

      <div class="row">
        <label>폰트 크기</label>
        <input type="range" id="fontSize" min="16" max="120" value="48">
        <span class="range-val" id="fontSizeVal">48</span>
      </div>

      <div class="row" style="margin-top:10px;">
        <label>외곽선 두께</label>
        <input type="range" id="strokeWidth" min="1" max="12" value="4">
        <span class="range-val" id="strokeWidthVal">4</span>
      </div>

      <div class="row" style="margin-top:10px;">
        <label>텍스트 색상</label>
        <input type="color" id="textColor" value="#ffffff">
        <label>외곽선 색상</label>
        <input type="color" id="strokeColor" value="#000000">
      </div>

      <div class="row" style="margin-top:10px;">
        <label>폰트</label>
        <select id="fontFamily">
          <option value="Impact">Impact</option>
          <option value="'Black Han Sans'">Black Han Sans</option>
          <option value="Arial Black">Arial Black</option>
          <option value="'Noto Sans KR'">Noto Sans KR</option>
          <option value="sans-serif">Sans-serif</option>
        </select>
      </div>

      <div style="margin-top:12px;">
        <label>텍스트 위치</label>
        <div class="position-section">
          <button class="pos-btn active" data-pos="top-bottom">상단+하단</button>
          <button class="pos-btn" data-pos="top">상단만</button>
          <button class="pos-btn" data-pos="bottom">하단만</button>
          <button class="pos-btn" data-pos="center">중앙</button>
        </div>
      </div>
    </div>

    <!-- Download -->
    <button class="btn btn-primary" id="downloadBtn" disabled>
      📥 PNG 다운로드
    </button>
  </div>

  <!-- Preview -->
  <div class="preview">
    <div class="canvas-wrap">
      <div class="canvas-placeholder" id="placeholder">
        <div class="icon">⬆️</div>
        <p>이미지를 업로드하면 여기에 미리보기가 표시됩니다</p>
      </div>
      <canvas id="canvas" style="display:none;"></canvas>
    </div>
  </div>
</div>

<!-- Google Font for Korean -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@700&display=swap" rel="stylesheet">

<script>
(function() {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const placeholder = document.getElementById('placeholder');
  const fileInput = document.getElementById('fileInput');
  const uploadZone = document.getElementById('uploadZone');
  const topText = document.getElementById('topText');
  const bottomText = document.getElementById('bottomText');
  const fontSize = document.getElementById('fontSize');
  const fontSizeVal = document.getElementById('fontSizeVal');
  const strokeWidth = document.getElementById('strokeWidth');
  const strokeWidthVal = document.getElementById('strokeWidthVal');
  const textColor = document.getElementById('textColor');
  const strokeColor = document.getElementById('strokeColor');
  const fontFamily = document.getElementById('fontFamily');
  const downloadBtn = document.getElementById('downloadBtn');
  const posButtons = document.querySelectorAll('.pos-btn');
  const apiKeyInput = document.getElementById('apiKey');
  const aiStatus = document.getElementById('aiStatus');
  const regenerateBtn = document.getElementById('regenerateBtn');

  let img = null;
  let currentBase64 = null;
  let textPosition = 'top-bottom';

  // Persist API key in localStorage
  const HARDCODED_KEY = ''; // 여기에 Claude API 키를 입력하거나 UI에서 직접 입력하세요
  apiKeyInput.value = localStorage.getItem('claude_api_key') || HARDCODED_KEY;
  apiKeyInput.addEventListener('input', () => {
    localStorage.setItem('claude_api_key', apiKeyInput.value);
  });

  // Upload zone events
  uploadZone.addEventListener('click', () => fileInput.click());
  uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
  uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
  uploadZone.addEventListener('drop', e => {
    e.preventDefault();
    uploadZone.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) loadImage(file);
  });
  fileInput.addEventListener('change', e => {
    if (e.target.files[0]) loadImage(e.target.files[0]);
  });

  function loadImage(file) {
    const reader = new FileReader();
    reader.onload = e => {
      const dataUrl = e.target.result;
      currentBase64 = dataUrl;

      img = new Image();
      img.onload = () => {
        placeholder.style.display = 'none';
        canvas.style.display = 'block';
        downloadBtn.disabled = false;
        regenerateBtn.disabled = false;
        render();
        generateMemeText();
      };
      img.src = dataUrl;
    };
    reader.readAsDataURL(file);
  }

  // AI meme text generation via Claude API
  async function generateMemeText() {
    const apiKey = apiKeyInput.value.trim();
    if (!apiKey) {
      setStatus('error', 'Claude API 키를 입력해주세요');
      return;
    }
    if (!currentBase64) return;

    setStatus('loading', '<span class="spinner"></span> AI가 짤 대사를 생성하는 중...');

    const base64Data = currentBase64.split(',')[1];
    const mediaType = currentBase64.split(';')[0].split(':')[1];

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 300,
          messages: [{
            role: 'user',
            content: [
              {
                type: 'image',
                source: {
                  type: 'base64',
                  media_type: mediaType,
                  data: base64Data
                }
              },
              {
                type: 'text',
                text: `이 이미지를 보고 한국 인터넷 밈/짤 스타일의 재미있는 대사를 만들어줘.

규칙:
- 상단 텍스트와 하단 텍스트를 각각 만들어줘
- 한국어로, 짧고 임팩트 있게
- 이미지의 상황/표정/맥락을 잘 반영해서 코믹하게
- 인터넷 밈 특유의 과장법이나 공감되는 유머를 활용해
- 반드시 아래 JSON 형식으로만 응답해:

{"top": "상단 텍스트", "bottom": "하단 텍스트"}`
              }
            ]
          }]
        })
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error?.message || `API 오류 (${res.status})`);
      }

      const data = await res.json();
      const text = data.content[0].text;

      // Parse JSON from response
      const jsonMatch = text.match(/\{[\s\S]*?"top"[\s\S]*?"bottom"[\s\S]*?\}/);
      if (jsonMatch) {
        const meme = JSON.parse(jsonMatch[0]);
        topText.value = meme.top || '';
        bottomText.value = meme.bottom || '';
        render();
        setStatus('success', 'AI 대사 생성 완료! 텍스트를 자유롭게 수정할 수 있습니다.');
      } else {
        throw new Error('AI 응답을 파싱할 수 없습니다');
      }
    } catch (err) {
      setStatus('error', '오류: ' + err.message);
    }
  }

  function setStatus(type, html) {
    aiStatus.className = 'ai-status ' + type;
    aiStatus.innerHTML = html;
  }

  // Regenerate button
  regenerateBtn.addEventListener('click', () => {
    if (currentBase64) generateMemeText();
  });

  // Position buttons
  posButtons.forEach(btn => {
    btn.addEventListener('click', () => {
      posButtons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      textPosition = btn.dataset.pos;
      render();
    });
  });

  // Live update events
  [topText, bottomText].forEach(el => el.addEventListener('input', render));
  [textColor, strokeColor, fontFamily].forEach(el => el.addEventListener('input', render));
  fontSize.addEventListener('input', () => { fontSizeVal.textContent = fontSize.value; render(); });
  strokeWidth.addEventListener('input', () => { strokeWidthVal.textContent = strokeWidth.value; render(); });

  function wrapText(text, maxWidth, size) {
    const font = `bold ${size}px ${fontFamily.value}`;
    ctx.font = font;
    const words = text.split('');
    const lines = [];
    let line = '';
    for (const ch of words) {
      if (ch === '\n') { lines.push(line); line = ''; continue; }
      const test = line + ch;
      if (ctx.measureText(test).width > maxWidth && line.length > 0) {
        lines.push(line);
        line = ch;
      } else {
        line = test;
      }
    }
    if (line) lines.push(line);
    return lines;
  }

  function drawText(text, yStart, direction) {
    if (!text.trim()) return;
    const size = parseInt(fontSize.value);
    const sw = parseInt(strokeWidth.value);
    const padding = 20;
    const maxW = canvas.width - padding * 2;
    const lines = wrapText(text, maxW, size);
    const lineHeight = size * 1.2;
    const font = `bold ${size}px ${fontFamily.value}`;

    ctx.font = font;
    ctx.fillStyle = textColor.value;
    ctx.strokeStyle = strokeColor.value;
    ctx.lineWidth = sw;
    ctx.textAlign = 'center';
    ctx.lineJoin = 'round';
    ctx.miterLimit = 2;

    lines.forEach((line, i) => {
      let y;
      if (direction === 'down') {
        y = yStart + (i + 1) * lineHeight;
      } else {
        y = yStart - (lines.length - 1 - i) * lineHeight;
      }
      const x = canvas.width / 2;
      ctx.strokeText(line, x, y);
      ctx.fillText(line, x, y);
    });
  }

  function render() {
    if (!img) return;
    canvas.width = img.naturalWidth;
    canvas.height = img.naturalHeight;
    ctx.drawImage(img, 0, 0);

    const size = parseInt(fontSize.value);
    const topPad = size + 10;
    const botPad = canvas.height - 20;

    const top = topText.value;
    const bottom = bottomText.value;

    if (textPosition === 'top-bottom') {
      drawText(top, topPad, 'down');
      drawText(bottom, botPad, 'up');
    } else if (textPosition === 'top') {
      drawText(top, topPad, 'down');
      drawText(bottom, topPad + parseInt(fontSize.value) * 1.2 * (wrapText(top, canvas.width - 40, size).length || 0) + 10, 'down');
    } else if (textPosition === 'bottom') {
      drawText(bottom, botPad, 'up');
      const bottomLines = wrapText(bottom, canvas.width - 40, size).length || 0;
      drawText(top, botPad - bottomLines * size * 1.2 - 10, 'up');
    } else if (textPosition === 'center') {
      const allText = [top, bottom].filter(Boolean).join('\n');
      const lines = wrapText(allText, canvas.width - 40, size);
      const totalH = lines.length * size * 1.2;
      const startY = (canvas.height - totalH) / 2 + size;
      drawText(allText, startY, 'down');
    }
  }

  // Download
  downloadBtn.addEventListener('click', () => {
    if (!img) return;
    const link = document.createElement('a');
    link.download = 'meme.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  });
})();
</script>

</body>
</html>
