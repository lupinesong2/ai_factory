<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>포켓몬 도감</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  body { background: #fafafa; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const API_BASE_URL = '/api';

// ========================================
// 🎨 포켓몬 카드
// ========================================
function PokemonCard({ pokemon }) {
  const imgUrl = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${pokemon.id}.png`;

  return (
    <div className="bg-white rounded-2xl p-4 shadow-sm hover:shadow-md transition-shadow cursor-pointer group">
      <div className="aspect-square bg-gray-50 rounded-xl flex items-center justify-center mb-3 overflow-hidden">
        <img
          src={imgUrl}
          alt={pokemon.name}
          className="w-3/4 h-3/4 object-contain group-hover:scale-110 transition-transform"
        />
      </div>
      <div className="flex items-center justify-between">
        <div>
          <p className="text-xs text-gray-400 font-mono">#{String(pokemon.id).padStart(3, "0")}</p>
          <p className="font-semibold text-gray-800 text-sm">{pokemon.name}</p>
        </div>
        <span
          className="text-[11px] px-2 py-0.5 rounded-full text-white font-medium"
          style={{ backgroundColor: pokemon.color }}
        >
          {pokemon.type}
        </span>
      </div>
    </div>
  );
}

// ========================================
// 🚀 App
// ========================================
function App() {
  const [query, setQuery] = useState("");
  const [filtered, setFiltered] = useState([]);
  const [loading, setLoading] = useState(true);

  const fetchPokemon = useCallback((q) => {
    setLoading(true);
    const url = q ? `${API_BASE_URL}/pokemon?q=${encodeURIComponent(q)}` : `${API_BASE_URL}/pokemon`;
    fetch(url)
      .then((res) => res.json())
      .then((json) => { if (json.success) setFiltered(json.data); })
      .catch(() => setFiltered([]))
      .finally(() => setLoading(false));
  }, []);

  useEffect(() => {
    const timer = setTimeout(() => fetchPokemon(query), 200);
    return () => clearTimeout(timer);
  }, [query, fetchPokemon]);

  return (
    <div className="max-w-2xl mx-auto px-4 py-10">
      <h1 className="text-2xl font-bold text-gray-800 mb-1">포켓몬 도감</h1>
      <p className="text-sm text-gray-400 mb-6">이름, 타입, 번호로 검색하세요</p>

      <input
        type="text"
        value={query}
        onChange={(e) => setQuery(e.target.value)}
        placeholder="검색..."
        className="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-gray-300 text-sm mb-6 bg-white"
      />

      {loading ? (
        <p className="text-center text-gray-400 py-12 text-sm">로딩 중...</p>
      ) : filtered.length === 0 ? (
        <p className="text-center text-gray-400 py-12 text-sm">검색 결과가 없습니다</p>
      ) : (
        <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
          {filtered.map((p) => (
            <PokemonCard key={p.id} pokemon={p} />
          ))}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
