  const variants = {
    primary: 'bg-gradient-to-r from-calm-500 to-calm-600 text-white hover:from-calm-600 hover:to-calm-700 shadow-md hover:shadow-lg',
    secondary: 'bg-white dark:bg-gray-700 text-calm-700 dark:text-calm-200 border-2 border-calm-200 dark:border-calm-600 hover:border-calm-400 hover:bg-calm-50 dark:hover:bg-gray-600',

    danger: 'bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400 hover:bg-red-200 dark:hover:bg-red-900/50',
  };

    sm: 'px-3 py-1.5 text-sm',
    md: 'px-5 py-2.5 text-base',
    lg: 'px-7 py-3.5 text-lg',
  };
  return (
    <button onClick={onClick} disabled={disabled}
      className={`${base} ${variants[variant]} ${sizes[size]} ${className}`}>
      {children}
    </button>
  );
}

function getTime() {
  const now = new Date();
  return `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
}

function findResponse(category, text) {
  const data = RESPONSES[category];
  if (!data) return GENERAL_RESPONSES[Math.floor(Math.random() * GENERAL_RESPONSES.length)];

  const lower = text.toLowerCase();
  for (const [keyword, response] of Object.entries(data.keywords)) {
    if (lower.includes(keyword)) return response;
  }
  return data.fallback;
}

const ThemeContext = createContext();

function ThemeProvider({ children }) {
  const [dark, setDark] = useState(false);
  useEffect(() => {
    document.documentElement.classList.toggle('dark', dark);
  }, [dark]);
  return (
    <ThemeContext.Provider value={{ dark, toggle: () => setDark(d => !d) }}>
      {children}
    </ThemeContext.Provider>
  );
}

function useTheme() { return useContext(ThemeContext); }

// ========================================
// 🧩 Common Components
// ========================================

function ThemeToggle() {
  const { dark, toggle } = useTheme();
  return (
    <button onClick={toggle}
      className="w-10 h-10 rounded-full flex items-center justify-center bg-white/20 hover:bg-white/30 transition-colors text-lg"
      aria-label="테마 변경">
      {dark ? '☀️' : '🌙'}
    </button>
  );
}

function StressGauge({ level }) {
  const clamp = Math.max(0, Math.min(100, level));
  const color = clamp < 30 ? 'from-green-400 to-teal-400' : clamp < 60 ? 'from-yellow-400 to-orange-400' : 'from-red-400 to-pink-500';
  const emoji = clamp < 30 ? '😌' : clamp < 60 ? '😰' : '🤯';
  const label = clamp < 30 ? '안정' : clamp < 60 ? '주의' : '위험';
  return (
    <div className="flex items-center gap-2">
      <span className="text-sm font-medium text-white/80">스트레스</span>
      <div className="w-20 h-2.5 bg-white/20 rounded-full overflow-hidden">
        <div className={`h-full bg-gradient-to-r ${color} rounded-full transition-all duration-700`}
          style={{ width: `${clamp}%` }} />
      </div>
      <span className="text-xs">{emoji} {label}</span>
    </div>
  );
}

function TypingIndicator() {
  return (
    <div className="flex items-end gap-2 animate-fade-in">
      <div className="w-8 h-8 rounded-full bg-gradient-to-br from-calm-400 to-calm-600 flex items-center justify-center text-sm text-white shadow">🛡️</div>
      <div className="bg-white dark:bg-gray-700 rounded-2xl rounded-bl-sm px-4 py-3 shadow-sm">
        <div className="flex gap-1">
          <span className="typing-dot w-2 h-2 bg-calm-400 rounded-full inline-block"></span>
          <span className="typing-dot w-2 h-2 bg-calm-400 rounded-full inline-block"></span>
          <span className="typing-dot w-2 h-2 bg-calm-400 rounded-full inline-block"></span>
        </div>
      </div>
    </div>
  );
}

function ChatBubble({ message }) {
  const isUser = message.sender === 'user';
  return (
    <div className={`flex items-end gap-2 animate-fade-in-up ${isUser ? 'flex-row-reverse' : ''}`}>
      {!isUser && (
        <div className="w-8 h-8 rounded-full bg-gradient-to-br from-calm-400 to-calm-600 flex items-center justify-center text-sm text-white shadow flex-shrink-0">
          🛡️
        </div>
      )}
      <div className={`max-w-[75%] ${isUser
        ? 'bg-gradient-to-br from-calm-500 to-calm-600 text-white rounded-2xl rounded-br-sm'
        : 'bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-100 rounded-2xl rounded-bl-sm shadow-sm'
      } px-4 py-3`}>
        <p className="text-sm leading-relaxed whitespace-pre-wrap">{message.text}</p>
        <p className={`text-[10px] mt-1 ${isUser ? 'text-white/60 text-right' : 'text-gray-400 dark:text-gray-500'}`}>
          {message.time}
        </p>
      </div>
    </div>
  );
}

// ========================================
// 📄 Landing Page
// ========================================

function LandingPage({ onSelect }) {
  const { dark } = useTheme();
  return (
    <div className="min-h-screen bg-gradient-to-br from-calm-50 via-white to-teal-50 dark:from-gray-900 dark:via-gray-800 dark:to-gray-900 flex flex-col">
      {/* Header */}
      <header className="p-4 flex justify-end">
        <ThemeToggle />
      </header>

      {/* Hero */}
      <div className="flex-1 flex flex-col items-center justify-center px-4 pb-8">
        <div className="text-center mb-10 animate-fade-in">
          <div className="text-6xl mb-4 animate-pulse-soft">🛡️</div>
          <h1 className="text-3xl md:text-4xl font-bold bg-gradient-to-r from-calm-600 to-teal-500 bg-clip-text text-transparent mb-3">
            멘탈지킴이
          </h1>
          <p className="text-gray-500 dark:text-gray-400 text-lg">회사 빌런 대응 전문 심리상담</p>
          <p className="text-gray-400 dark:text-gray-500 text-sm mt-2">당신의 직장 생활, 혼자 고민하지 마세요</p>
        </div>

        {/* Category Selection */}
        <div className="w-full max-w-lg space-y-3 animate-fade-in" style={{ animationDelay: '0.2s' }}>
          <p className="text-center text-sm font-medium text-gray-500 dark:text-gray-400 mb-4">
            어떤 빌런 때문에 힘드신가요?
          </p>
          {CATEGORIES.map((cat, i) => (
            <Card key={cat.id} onClick={() => onSelect(cat.id)}
              className="p-4 flex items-center gap-4 animate-fade-in-up"
              style={{ animationDelay: `${0.1 * i}s` }}>
              <div className={`w-12 h-12 rounded-xl bg-gradient-to-br ${cat.color} flex items-center justify-center text-2xl shadow-sm flex-shrink-0`}>
                {cat.emoji}
              </div>
              <div className="flex-1 min-w-0">
                <div className="flex items-center gap-2 mb-0.5">
                  <h3 className="font-semibold text-gray-800 dark:text-gray-100">{cat.name}</h3>
                  <Badge color={cat.badge}>상담</Badge>
                </div>
                <p className="text-sm text-gray-500 dark:text-gray-400 truncate">{cat.desc}</p>
              </div>
              <span className="text-gray-300 dark:text-gray-600 text-xl">›</span>
            </Card>
          ))}
        </div>

        <p className="text-xs text-gray-400 dark:text-gray-500 mt-8 text-center">
          ※ 본 서비스는 전문 심리상담을 대체하지 않습니다.<br/>
          심각한 경우 전문 상담사와 상담하시길 권합니다.
        </p>
      </div>
    </div>
  );
}

// ========================================
// 💬 Chat Page
// ========================================

function ChatPage({ category, onBack }) {
  const cat = CATEGORIES.find(c => c.id === category);
  const data = RESPONSES[category];
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState('');
  const [typing, setTyping] = useState(false);
  const [stress, setStress] = useState(50);
  const chatRef = useRef(null);
  const inputRef = useRef(null);

  // Initial greeting
  useEffect(() => {
    setTyping(true);
    const t = setTimeout(() => {
      setMessages([{ id: 1, sender: 'bot', text: data.greeting, time: getTime() }]);
      setTyping(false);
    }, 800);
    return () => clearTimeout(t);
  }, []);

  // Auto scroll
  useEffect(() => {
    if (chatRef.current) {
      chatRef.current.scrollTop = chatRef.current.scrollHeight;
    }
  }, [messages, typing]);

  const [sessionId, setSessionId] = useState(() => `session-${Date.now()}`);

  const sendMessage = useCallback(async (text) => {
    if (!text.trim()) return;
    const userMsg = { id: Date.now(), sender: 'user', text: text.trim(), time: getTime() };
    setMessages(prev => [...prev, userMsg]);
    setInput('');
    setStress(s => Math.max(0, s - 5));
    setTyping(true);

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text.trim(), category, sessionId }),
      });
      const json = await res.json();

      if (json.success) {
        if (json.data.sessionId) setSessionId(json.data.sessionId);
        setMessages(prev => [...prev, { id: Date.now() + 1, sender: 'bot', text: json.data.reply, time: getTime() }]);
        setStress(s => Math.max(0, s - 8));
      } else {
        setMessages(prev => [...prev, { id: Date.now() + 1, sender: 'bot', text: `⚠️ ${json.message || '응답을 가져올 수 없습니다.'}`, time: getTime() }]);
      }
    } catch (err) {
      const fallback = findResponse(category, text);
      setMessages(prev => [...prev, { id: Date.now() + 1, sender: 'bot', text: fallback, time: getTime() }]);
      setStress(s => Math.max(0, s - 8));
    } finally {
      setTyping(false);
    }
  }, [category, sessionId]);

  const handleSubmit = (e) => {
    e.preventDefault();
    sendMessage(input);
  };

  const quickReplies = data?.quickReplies || [];

  return (
    <div className="h-screen flex flex-col bg-gradient-to-b from-calm-50 to-white dark:from-gray-900 dark:to-gray-800">
      {/* Chat Header */}
      <div className={`bg-gradient-to-r ${cat.color} text-white px-4 py-3 flex items-center gap-3 shadow-md`}>
        <button onClick={onBack} className="w-9 h-9 rounded-full bg-white/20 hover:bg-white/30 flex items-center justify-center transition-colors" aria-label="뒤로가기">
          ←
        </button>
        <div className="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center text-xl">
          {cat.emoji}
        </div>
        <div className="flex-1 min-w-0">
          <h2 className="font-semibold text-sm">멘탈지킴이</h2>
          <p className="text-xs text-white/70">{cat.name} 상담 중</p>
        </div>
        <StressGauge level={stress} />
        <ThemeToggle />
      </div>

      {/* Messages */}
      <div ref={chatRef} className="flex-1 overflow-y-auto chat-scroll px-4 py-4 space-y-4">
        {messages.map(msg => <ChatBubble key={msg.id} message={msg} />)}
        {typing && <TypingIndicator />}
      </div>

      {/* Quick Replies */}
      {messages.length <= 2 && quickReplies.length > 0 && (
        <div className="px-4 pb-2 flex gap-2 overflow-x-auto animate-fade-in">
          {quickReplies.map((qr, i) => (
            <button key={i} onClick={() => sendMessage(qr)}
              className="flex-shrink-0 px-3 py-1.5 bg-white dark:bg-gray-700 border border-calm-200 dark:border-calm-700 rounded-full text-xs text-calm-600 dark:text-calm-300 hover:bg-calm-50 dark:hover:bg-gray-600 transition-colors whitespace-nowrap">
              {qr}
            </button>
          ))}
        </div>
      )}

      {/* Input */}
      <form onSubmit={handleSubmit} className="p-3 bg-white/80 dark:bg-gray-800/80 backdrop-blur border-t border-gray-100 dark:border-gray-700">
        <div className="flex gap-2 max-w-2xl mx-auto">
          <input ref={inputRef} value={input} onChange={e => setInput(e.target.value)}
            placeholder="고민을 편하게 이야기해 주세요..."
            className="flex-1 px-4 py-2.5 bg-gray-100 dark:bg-gray-700 rounded-xl text-sm text-gray-800 dark:text-gray-100 placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-calm-400 transition-all" />
          <Button variant="primary" size="md" className="!px-4 !rounded-xl" disabled={!input.trim()}>
            전송
          </Button>
        </div>
      </form>
    </div>
  );
}

// ========================================
// 🚀 App Component
// ========================================

function App() {
  const [screen, setScreen] = useState('landing');
  const [category, setCategory] = useState(null);

  const handleSelect = (catId) => {
    setCategory(catId);
    setScreen('chat');
  };

  const handleBack = () => {
    setScreen('landing');
    setCategory(null);
  };

  return (
    <ThemeProvider>
      {screen === 'landing' && <LandingPage onSelect={handleSelect} />}
      {screen === 'chat' && <ChatPage category={category} onBack={handleBack} />}
    </ThemeProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
