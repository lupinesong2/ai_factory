<body>
<div id="root"></div>
<script type="text/babel">

// ========================================
// React Hooks Destructuring
// ========================================
const { useState, useEffect, useRef, useCallback, useMemo, createContext, useContext } = React;

// ========================================
// Constants & API
// ========================================
const API_KEY = 'I3QMMcebpywT43hEm98u6me4t3JTwvDUivADCfro';
const API_BASE = 'https://api.nasa.gov/planetary/apod';

function formatDate(date) {
  const d = new Date(date);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function getLastNDays(n) {
  const dates = [];
  const today = new Date();
  for (let i = 1; i <= n; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() - i);
    dates.push(formatDate(d));
  }
  return dates;
}

function formatKoreanDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const year = d.getFullYear();
  const month = d.getMonth() + 1;
  const day = d.getDate();
  const weekdays = ['일', '월', '화', '수', '목', '금', '토'];
  const weekday = weekdays[d.getDay()];
  return `${year}년 ${month}월 ${day}일 (${weekday})`;
}

function extractPullQuote(text) {
  if (!text) return null;
  const sentences = text.match(/[^.!?]+[.!?]+/g) || [];
  const good = sentences.filter(s => s.trim().length > 60 && s.trim().length < 200);
  if (good.length > 2) return good[Math.floor(good.length / 2)].trim();
  if (good.length > 0) return good[0].trim();
  return null;
}

// ========================================
// Design System Components
// ========================================

function StarField() {
  const stars = useMemo(() => {
    const arr = [];
    for (let i = 0; i < 80; i++) {
      arr.push({
        id: i,
        left: Math.random() * 100,
        top: Math.random() * 100,
        size: Math.random() * 2 + 1,
        delay: Math.random() * 5,
        duration: Math.random() * 3 + 2,
        opacity: Math.random() * 0.5 + 0.2,
      });
    }
    return arr;
  }, []);

  return (
    <div className="absolute inset-0 overflow-hidden pointer-events-none" aria-hidden="true">
      {stars.map(s => (
        <div
          key={s.id}
          className="star animate-twinkle"
          style={{
            left: `${s.left}%`,
            top: `${s.top}%`,
            width: `${s.size}px`,
            height: `${s.size}px`,
            animationDelay: `${s.delay}s`,
            animationDuration: `${s.duration}s`,
            opacity: s.opacity,
          }}
        />
      ))}
    </div>
  );
}

function ShimmerBlock({ className = '' }) {
  return (
    <div className={`shimmer-bg animate-shimmer rounded ${className}`} />
  );
}

function Divider() {
  return (
    <div className="flex items-center justify-center gap-4 my-12">
      <div className="h-px flex-1 bg-gradient-to-r from-transparent via-gold-400/30 to-transparent" />
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" className="text-gold-400 opacity-60">
        <path d="M10 0L12.2 7.8L20 10L12.2 12.2L10 20L7.8 12.2L0 10L7.8 7.8L10 0Z" fill="currentColor"/>
      </svg>
      <div className="h-px flex-1 bg-gradient-to-r from-transparent via-gold-400/30 to-transparent" />
    </div>
  );
}

function Modal({ isOpen, onClose, children }) {
  useEffect(() => {
    if (isOpen) {
      document.body.style.overflow = 'hidden';
    } else {
      document.body.style.overflow = '';
    }
    return () => { document.body.style.overflow = ''; };
  }, [isOpen]);

  if (!isOpen) return null;

  return (
    <div
      className="fixed inset-0 z-50 flex items-center justify-center p-4 modal-backdrop bg-cosmos-900/80"
      onClick={onClose}
      role="dialog"
      aria-modal="true"
    >
      <div
        className="relative max-w-5xl w-full max-h-[90vh] overflow-auto rounded-lg bg-cosmos-800 border border-cosmos-600/50 shadow-2xl animate-fadeIn"
        onClick={e => e.stopPropagation()}
      >
        <button
          onClick={onClose}
          className="absolute top-4 right-4 z-10 w-10 h-10 flex items-center justify-center rounded-full bg-cosmos-900/80 text-white/70 hover:text-white hover:bg-cosmos-900 transition-all"
          aria-label="닫기"
        >
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
            <path d="M18 6L6 18M6 6l12 12"/>
          </svg>
        </button>
        {children}
      </div>
    </div>
  );
}

        <ShimmerBlock className="w-1/2 max-w-md h-6 mb-8" />

}

            <circle cx="50" cy="50" r="48" fill="none" stroke="currentColor" strokeWidth="2"/>
            <path d="M50 10 C55 30, 70 45, 90 50 C70 55, 55 70, 50 90 C45 70, 30 55, 10 50 C30 45, 45 30, 50 10Z" fill="currentColor" opacity="0.6"/>
          </svg>
          <span className="font-serif text-lg tracking-widest text-white/80 uppercase">NASA APOD</span>
        </div>
      </div>

      <div className="absolute bottom-0 left-0 right-0 z-20 pb-16 md:pb-24 px-6 text-center" style={{ animationDelay: '0.3s' }}>
        <p className="font-body text-xs tracking-[0.3em] text-gold-400 uppercase mb-4 animate-fadeUp" style={{ animationDelay: '0.2s' }}>
          오늘의 천문학 사진
        </p>
        <h1 className="font-serif text-3xl sm:text-4xl md:text-5xl lg:text-6xl font-bold text-white max-w-4xl mx-auto leading-tight mb-4 animate-fadeUp" style={{ animationDelay: '0.4s' }}>
          {data.title}
        </h1>
        {data.copyright && (
          <p className="font-editorial text-base md:text-lg text-white/50 italic animate-fadeUp" style={{ animationDelay: '0.6s' }}>
            Photo by {data.copyright.trim()}
          </p>
        )}
        <p className="font-body text-sm text-white/40 mt-4 animate-fadeUp" style={{ animationDelay: '0.7s' }}>
          {formatKoreanDate(data.date)}
        </p>
        <div className="mt-8 animate-fadeUp" style={{ animationDelay: '0.9s' }}>
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className="mx-auto text-white/30 animate-bounce">
            <path d="M12 5v14M5 12l7 7 7-7"/>
          </svg>
        </div>
      </div>
    </section>
  );
}

// ========================================
// Article Section
// ========================================

function ArticleSkeleton() {
  return (
    <section className="max-w-4xl mx-auto px-6 py-20">
      <ShimmerBlock className="w-full h-4 mb-3" />
      <ShimmerBlock className="w-full h-4 mb-3" />
      <ShimmerBlock className="w-5/6 h-4 mb-3" />
      <ShimmerBlock className="w-full h-4 mb-3" />
      <ShimmerBlock className="w-3/4 h-4 mb-3" />
    </section>
  );
}

function ArticleSection({ data }) {
  const pullQuote = useMemo(() => extractPullQuote(data.explanation), [data.explanation]);
  const explanationParts = useMemo(() => {
    if (!pullQuote || !data.explanation) return [data.explanation, null];
    const idx = data.explanation.indexOf(pullQuote);
    if (idx === -1) return [data.explanation, null];
    return [
      data.explanation.slice(0, idx),
      data.explanation.slice(idx + pullQuote.length)
    ];
  }, [data.explanation, pullQuote]);

  return (
    <section className="relative py-16 md:py-24">
      <StarField />
      <div className="max-w-4xl mx-auto px-6 relative z-10">
        <div className="flex items-center gap-6 mb-10">
          <div className="flex flex-col">
            <span className="font-body text-xs tracking-[0.2em] text-gold-400/80 uppercase">
              {formatKoreanDate(data.date)}

            {data.copyright && (
              <span className="font-editorial text-sm text-white/40 italic mt-1">
                {data.copyright.trim()}
              </span>
            )}
          </div>
        </div>

        <div className="article-columns text-white/80 font-body text-base md:text-lg leading-relaxed">
          <p className="drop-cap mb-6">
            {explanationParts[0]}

          {pullQuote && (
            <blockquote className="pull-quote pl-6 my-8 break-inside-avoid">
              <p className="font-editorial text-xl md:text-2xl italic text-gold-400/90 leading-relaxed">
                "{pullQuote}"
              </p>
            </blockquote>
          )}

          {explanationParts[1] && (
            <p className="mb-6">
              {explanationParts[1]}
            </p>
          )}
        </div>

        {(data.hdurl || data.url) && data.media_type === 'image' && (
          <div className="mt-12 text-center">
            <a
              href={data.hdurl || data.url}
              target="_blank"

              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/>
              </svg>
              HD 원본 이미지 보기
            </a>
          </div>
        )}
      </div>
    </section>
  );
}

// Date Picker Section

function DatePickerSection({ onDateSelect, currentDate }) {

        <Divider />

        <form onSubmit={handleSubmit} className="flex flex-col sm:flex-row items-center justify-center gap-4">
          <input
            type="date"
            value={selectedDate}
            onChange={e => setSelectedDate(e.target.value)}

// ========================================
// Gallery Section
// ========================================

function GalleryCard({ item, onClick, index }) {
  const [loaded, setLoaded] = useState(false);
  const isVideo = item.media_type === 'video';

  let thumbnail = item.url;
  if (isVideo) {
    const ytMatch = item.url.match(/(?:youtube\.com\/embed\/|youtu\.be\/)([^?&]+)/);
    if (ytMatch) {
      thumbnail = `https://img.youtube.com/vi/${ytMatch[1]}/hqdefault.jpg`;
    }
  }

  return (
    <div
      className="gallery-item group relative cursor-pointer overflow-hidden rounded-lg animate-fadeUp"
      style={{ animationDelay: `${index * 0.1}s` }}
      onClick={() => onClick(item)}
      role="button"
      tabIndex={0}
      aria-label={`${item.title} 보기`}
      onKeyDown={e => e.key === 'Enter' && onClick(item)}
    >
      <div className="aspect-[4/3] overflow-hidden bg-cosmos-700">
        {!loaded && <div className="w-full h-full shimmer-bg animate-shimmer" />}
        <img
          src={thumbnail}
          alt={item.title}
          className={`gallery-img w-full h-full object-cover transition-transform duration-700 ${loaded ? 'opacity-100' : 'opacity-0'}`}
          onLoad={() => setLoaded(true)}
          loading="lazy"
        />
      </div>
      <div className="gallery-overlay absolute inset-0 bg-gradient-to-t from-cosmos-900/95 via-cosmos-900/40 to-transparent opacity-0 transition-opacity duration-300 flex flex-col justify-end p-4">
        <p className="text-xs text-gold-400/80 font-body mb-1">{formatKoreanDate(item.date)}</p>
        <h3 className="font-serif text-sm md:text-base text-white leading-snug">{item.title}</h3>
        {isVideo && (
          <span className="inline-flex items-center gap-1 text-xs text-white/50 mt-1">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21"/></svg>
            동영상
          </span>
        )}
      </div>
      <div className="absolute bottom-0 left-0 right-0 h-1/2 bg-gradient-to-t from-cosmos-900/70 to-transparent group-hover:opacity-0 transition-opacity duration-300" />
      <p className="absolute bottom-3 left-3 right-3 font-serif text-xs md:text-sm text-white/80 group-hover:opacity-0 transition-opacity duration-300 truncate">
        {item.title}
      </p>
    </div>
  );
}

function GallerySkeleton() {
  return (
    <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
      {[...Array(7)].map((_, i) => (
        <div key={i} className="aspect-[4/3] shimmer-bg animate-shimmer rounded-lg" style={{ animationDelay: `${i * 0.1}s` }} />

// Gallery Detail Modal
// ========================================

          {!isVideo && (item.hdurl || item.url) && (

              HD 원본 보기
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3"/>
              </svg>
            </a>
          )}
        </div>
      </div>
    </Modal>
  );
}

// ========================================
// Footer
// ========================================

function Footer() {
  return (
    <footer className="relative py-12 border-t border-cosmos-600/20">
      <div className="max-w-4xl mx-auto px-6 text-center">
        <div className="flex items-center justify-center gap-2 mb-4">
          <svg width="18" height="18" viewBox="0 0 100 100" className="text-gold-400/60">
            <circle cx="50" cy="50" r="48" fill="none" stroke="currentColor" strokeWidth="2"/>
            <path d="M50 10 C55 30, 70 45, 90 50 C70 55, 55 70, 50 90 C45 70, 30 55, 10 50 C30 45, 45 30, 50 10Z" fill="currentColor" opacity="0.6"/>
          </svg>
          <span className="font-serif text-sm tracking-widest text-white/30 uppercase">NASA APOD</span>
        </div>
        <p className="font-body text-xs text-white/20">
          Powered by NASA Astronomy Picture of the Day API
        </p>
        <p className="font-body text-xs text-white/15 mt-1">
          Images and descriptions courtesy of NASA and respective copyright holders
        </p>
      </div>
    </footer>
  );
}

// ========================================
// Error Component
// ========================================

function ErrorMessage({ message, onRetry }) {
  return (
    <div className="flex flex-col items-center justify-center py-24 px-6 text-center">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1" className="text-gold-400/40 mb-4">
        <circle cx="12" cy="12" r="10"/>
        <path d="M12 8v4M12 16h.01"/>
      </svg>
      <p className="font-body text-white/50 mb-4">{message}</p>
      {onRetry && (
        <button
          onClick={onRetry}
          className="px-6 py-2 border border-gold-400/30 rounded-full text-gold-400 text-sm font-body hover:bg-gold-400/10 transition-all"
        >
          다시 시도
        </button>
      )}
    </div>
  );
}

// ========================================
// App Component
// ========================================

function App() {
  const [todayData, setTodayData] = useState(null);
  const [galleryData, setGalleryData] = useState([]);
  const [todayLoading, setTodayLoading] = useState(true);
  const [galleryLoading, setGalleryLoading] = useState(true);
  const [todayError, setTodayError] = useState(null);
  const [galleryError, setGalleryError] = useState(null);
  const [selectedItem, setSelectedItem] = useState(null);
  const [modalOpen, setModalOpen] = useState(false);

  const fetchApod = useCallback(async (date) => {
    setTodayLoading(true);
    setTodayError(null);
    try {
      const params = date ? `&date=${date}` : '';
      const res = await fetch(`${API_BASE}?api_key=${API_KEY}${params}`);
      if (!res.ok) throw new Error(`API 오류: ${res.status}`);
      const json = await res.json();
      setTodayData(json);
    } catch (err) {
      setTodayError(err.message || '오늘의 사진을 불러올 수 없습니다.');
    } finally {
      setTodayLoading(false);
    }
  }, []);

  const fetchGallery = useCallback(async () => {
    setGalleryLoading(true);
    setGalleryError(null);
    try {
      const end = new Date();
      end.setDate(end.getDate() - 1);
      const start = new Date();
      start.setDate(start.getDate() - 7);
      const res = await fetch(
        `${API_BASE}?api_key=${API_KEY}&start_date=${formatDate(start)}&end_date=${formatDate(end)}`
      );
      if (!res.ok) throw new Error(`API 오류: ${res.status}`);
      const json = await res.json();
      setGalleryData(json.reverse());
    } catch (err) {
      setGalleryError(err.message || '갤러리를 불러올 수 없습니다.');
    } finally {
      setGalleryLoading(false);
    }
  }, []);

  useEffect(() => {
    fetchApod();
    fetchGallery();
  }, [fetchApod, fetchGallery]);

  const handleDateSelect = (date) => {
    fetchApod(date);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  const handleGalleryClick = (item) => {
    setSelectedItem(item);
    setModalOpen(true);
  };

  return (
    <div className="min-h-screen bg-cosmos-900">
      {/* Hero */}
      {todayLoading ? (
        <HeroSkeleton />
      ) : todayError ? (
        <div className="h-screen flex items-center justify-center relative">
          <StarField />
          <ErrorMessage message={todayError} onRetry={() => fetchApod()} />
        </div>
      ) : todayData ? (
        <HeroSection data={todayData} />
      ) : null}

      {/* Article */}
      {todayLoading ? (
        <ArticleSkeleton />
      ) : todayData && !todayError ? (
        <ArticleSection data={todayData} />
      ) : null}

      {/* Date Picker */}
      <DatePickerSection
        onDateSelect={handleDateSelect}
        currentDate={todayData?.date}
      />

      {/* Gallery */}
      {galleryError ? (
        <div className="py-16">
          <ErrorMessage message={galleryError} onRetry={fetchGallery} />
        </div>
      ) : (
        <GallerySection
          items={galleryData}
          loading={galleryLoading}
          onItemClick={handleGalleryClick}
        />
      )}

      {/* Gallery Detail Modal */}
      <GalleryDetail
        item={selectedItem}
        isOpen={modalOpen}
        onClose={() => setModalOpen(false)}
      />

      {/* Footer */}
      <Footer />
    </div>
  );
}

// ========================================
// Rendering
// ========================================
ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
</body>
</html>
